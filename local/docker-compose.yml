name: debbly

services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: debbly-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - debbly-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: debbly-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - debbly-network

  # LiveKit - Real-time video/audio communication server for live calls
  # Depends on Redis used for distributed locks and room state
  livekit:
    image: livekit/livekit-server:latest
    container_name: debbly-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"              # HTTP API
      - "7881:7881"              # WebRTC over TCP
      - "6789:6789"              # TURN server for NAT traversal
      - "6000-6100:6000-6100/udp"  # WebRTC media ports (UDP)
    volumes:
      - ./livekit.yaml:/livekit.yaml
    env_file:
      - .env
    command: [ "--config", "/livekit.yaml" ]
    depends_on:
      - redis
    networks:
      - debbly-network

  # Egress - Records and exports debate sessions to S3 storage
  # Needs both Redis (for queue management) and LiveKit (for room access)
  # Uses host network to share localhost with LiveKit for WebRTC connectivity
  egress:
    image: livekit/egress:latest
    container_name: debbly-egress
    restart: always
    network_mode: host
    volumes:
      - ./egress.yaml:/egress.yaml
    env_file:
      - .env
    environment:
      - EGRESS_CONFIG_FILE=/egress.yaml
    depends_on:
      - redis
      - livekit

volumes:
  redis_data:
  postgres_data:

networks:
  debbly-network:
    driver: bridge