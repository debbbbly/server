name: debbly

services:

  redis:
    image: redis:7-alpine
    container_name: debbly-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    container_name: debbly-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "6000-6100:6000-6100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    env_file:
      - .env.local
    command: ["--config", "/livekit.yaml"]
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    container_name: debbly-egress
    restart: always
    volumes:
      - ./egress.yaml:/egress.yaml
    env_file:
      - .env.local
    environment:
      - EGRESS_CONFIG_FILE=/egress.yaml
    depends_on:
      - redis
      - livekit

volumes:
  redis_data: