port: 7880
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 6000
  port_range_end: 6100
  use_external_ip: false

redis:
  address: redis:6379

keys:
  dev-livekit-api-key-for-development: dev-livekit-api-secret-for-development

webhook:
  api_key: dev-livekit-api-key-for-development
  urls:
    - 'http://host.docker.internal:8080/livekit/webhook'

# Enable Prometheus metrics
prometheus_port: 6789