<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Layout</title>
    <script src="https://cdn.livekit.io/egress/v1/room-composite.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #container { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .participant-container { flex: 1; width: 100%; position: relative; overflow: hidden; }
        .participant-container video { width: 100%; height: 100%; object-fit: cover; }
        .participant-container:first-child { border-bottom: 1px solid #1a1a1a; }
        .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: #111; color: #444; font-family: system-ui,
sans-serif; font-size: 1.5rem; }
    </style>
</head>
<body>
<div id="container">
    <div class="participant-container" id="top">
        <div class="placeholder">Waiting...</div>
    </div>
    <div class="participant-container" id="bottom">
        <div class="placeholder">Waiting...</div>
    </div>
</div>
<script>
    const containers = { top: document.getElementById('top'), bottom: document.getElementById('bottom') };
    const participants = { top: null, bottom: null };

    function attachVideo(container, participant) {
        container.innerHTML = '';
        const videoTrack = participant.getTrack('camera')?.track;
        if (videoTrack) container.appendChild(videoTrack.attach());
        participant.on('trackSubscribed', (track) => {
            if (track.kind === 'video') { container.innerHTML = ''; container.appendChild(track.attach()); }
        });
    }

    function assignParticipant(participant) {
        if (!participants.top) { participants.top = participant; attachVideo(containers.top, participant); }
        else if (!participants.bottom) { participants.bottom = participant; attachVideo(containers.bottom, participant); }
    }

    EgressHelper.onParticipantUpdate((p) => {
        if (participants.top?.sid === p.sid) attachVideo(containers.top, p);
        else if (participants.bottom?.sid === p.sid) attachVideo(containers.bottom, p);
        else assignParticipant(p);
    });
    EgressHelper.onParticipantDisconnected((p) => {
        if (participants.top?.sid === p.sid) { participants.top = null; containers.top.innerHTML = '<div class="placeholder">Waiting...</div>'; }
        else if (participants.bottom?.sid === p.sid) { participants.bottom = null; containers.bottom.innerHTML = '<div class="placeholder">Waiting...</div>'; }
    });
    EgressHelper.start();
</script>
</body>
</html>
