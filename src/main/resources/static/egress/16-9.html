<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side by Side Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
        }

        .participant-container {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .participant-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            color: #444;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
<div id="container">
    <div class="participant-container" id="left">
        <div class="placeholder">Waiting...</div>
    </div>
    <div class="participant-container" id="right">
        <div class="placeholder">Waiting...</div>
    </div>
</div>

<script>
    const { Room, RoomEvent, Track } = LivekitClient;
    const leftContainer = document.getElementById('left');
    const rightContainer = document.getElementById('right');

    let leftParticipant = null;
    let rightParticipant = null;

    // Inline EgressHelper - reads query params set by LiveKit egress
    const params = new URLSearchParams(window.location.search);
    const livekitURL = params.get('url');
    const accessToken = params.get('token');

    console.log('Query params:', window.location.search);
    console.log('LiveKit URL:', livekitURL);
    console.log('Token present:', !!accessToken);

    function attachVideo(container, participant) {
        container.innerHTML = '';

        const cameraPublication = participant.getTrackPublication(Track.Source.Camera);
        if (cameraPublication && cameraPublication.track) {
            const videoElement = cameraPublication.track.attach();
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'cover';
            videoElement.style.display = 'block';
            container.appendChild(videoElement);
        }
    }

    function showPlaceholder(container) {
        container.innerHTML = '<div class="placeholder">Waiting...</div>';
    }

    function assignParticipant(participant) {
        if (!leftParticipant) {
            leftParticipant = participant;
            attachVideo(leftContainer, participant);
        } else if (!rightParticipant && participant.identity !== leftParticipant.identity) {
            rightParticipant = participant;
            attachVideo(rightContainer, participant);
        }
    }

    function removeParticipant(participant) {
        if (leftParticipant?.identity === participant.identity) {
            leftParticipant = null;
            showPlaceholder(leftContainer);
        } else if (rightParticipant?.identity === participant.identity) {
            rightParticipant = null;
            showPlaceholder(rightContainer);
        }
    }

    async function main() {
        const room = new Room();

        room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
            if (track.kind !== Track.Kind.Video) return;

            if (leftParticipant?.identity === participant.identity) {
                attachVideo(leftContainer, leftParticipant);
            } else if (rightParticipant?.identity === participant.identity) {
                attachVideo(rightContainer, rightParticipant);
            } else {
                assignParticipant(participant);
            }
        });

        room.on(RoomEvent.TrackUnsubscribed, (track) => {
            if (track.kind === Track.Kind.Video) {
                track.detach().forEach(el => el.remove());
            }
        });

        room.on(RoomEvent.ParticipantConnected, (participant) => {
            assignParticipant(participant);
        });

        room.on(RoomEvent.ParticipantDisconnected, (participant) => {
            removeParticipant(participant);
        });

        await room.connect(livekitURL, accessToken);

        // Handle participants already in the room
        room.remoteParticipants.forEach((participant) => {
            assignParticipant(participant);
        });

        // Signal to LiveKit egress that the page is ready for recording
        console.log('START_RECORDING');
    }

    main();
</script>
</body>
</html>
