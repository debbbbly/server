databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: stages
            columns:
              - column:
                  name: stage_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(1024)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: closed_at
                  type: timestamp
  - changeSet:
      id: 2
      author: gemini
      changes:
        - createTable:
            tableName: stage_hosts
            columns:
              - column:
                  name: stage_id
                  type: varchar(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_hosts_stage
                    references: stages(stage_id)
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_hosts_user
                    references: users(user_id)
              - column:
                  name: stance
                  type: varchar(16)
        - addPrimaryKey:
            tableName: stage_hosts
            columnNames: stage_id, user_id
  - changeSet:
      id: 3
      author: gemini
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: stages
            constraintName: fk_stages_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
  - changeSet:
      id: 4
      author: gemini
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: status
                  type: varchar(16)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: opened_at
                  type: timestamp
                  constraints:
                    nullable: true
  - changeSet:
      id: 6
      author: gemini
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: hls_url
                  type: varchar(512)
                  constraints:
                    nullable: true
  - changeSet:
      id: 7
      author: gemini
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: recorded
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
  - changeSet:
      id: 8
      author: claude
      changes:
        - createIndex:
            indexName: idx_stages_opened_at
            tableName: stages
            columns:
              - column:
                  name: opened_at
  - changeSet:
      id: 9
      author: claude
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: topic_id
                  type: varchar(16)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseColumnNames: topic_id
            baseTableName: stages
            constraintName: fk_stages_topic_id
            referencedColumnNames: topic_id
            referencedTableName: topics
  - changeSet:
      id: 10
      author: claude
      comment: index
      changes:
        - createIndex:
            indexName: idx_stages_topic_id_status_opened_at
            tableName: stages
            columns:
              - column:
                  name: topic_id
              - column:
                  name: status
              - column:
                  name: opened_at
                  descending: true
  - changeSet:
      id: 11
      author: claude
      comment: Add close_reason column and drop recorded column
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: close_reason
                  type: varchar(32)
                  constraints:
                    nullable: true
        - dropColumn:
            tableName: stages
            columnName: recorded
  - changeSet:
      id: 12
      author: claude
      comment: Add thumbnail_url column
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: thumbnail_url
                  type: varchar(512)
                  constraints:
                    nullable: true
  - changeSet:
      id: 13
      author: claude
      comment: Extract stage_media from stages
      changes:
        - createTable:
            tableName: stage_media
            columns:
              - column:
                  name: stage_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_stage_media_stage
                    references: stages(stage_id)
              - column:
                  name: hls_live_url
                  type: varchar(512)
                  constraints:
                    nullable: true
              - column:
                  name: hls_recording_url
                  type: varchar(512)
                  constraints:
                    nullable: true
              - column:
                  name: thumbnail_url
                  type: varchar(512)
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: composite_egress_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: visibility
                  type: varchar(32)
                  defaultValue: "PUBLIC"
                  constraints:
                    nullable: false
              - column:
                  name: duration_seconds
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        - sql:
            sql: >
              INSERT INTO stage_media (stage_id, hls_recording_url, thumbnail_url, status, composite_egress_id, visibility, created_at)
              SELECT stage_id, hls_url, thumbnail_url, 'COMPLETED', 'migrated', 'PUBLIC', COALESCE(closed_at, created_at)
              FROM stages WHERE status = 'RECORDED'
        - sql:
            sql: >
              UPDATE stages SET status = 'CLOSED' WHERE status = 'RECORDED'
        - dropColumn:
            tableName: stages
            columnName: hls_url
        - dropColumn:
            tableName: stages
            columnName: thumbnail_url

  - changeSet:
      id: 14
      author: system
      preConditions:
        - onFail: MARK_RAN
          not:
            indexExists:
              indexName: idx_stage_hosts_user_id
              tableName: stage_hosts
      changes:
        - createIndex:
            indexName: idx_stage_hosts_user_id
            tableName: stage_hosts
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 15
      author: system
      preConditions:
        - onFail: MARK_RAN
          not:
            indexExists:
              indexName: idx_stages_claim_id
              tableName: stages
      changes:
        - createIndex:
            indexName: idx_stages_claim_id
            tableName: stages
            columns:
              - column:
                  name: claim_id