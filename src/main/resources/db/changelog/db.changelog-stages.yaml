databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: stages
            columns:
              - column:
                  name: stage_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: varchar(1024)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: closed_at
                  type: timestamp
  - changeSet:
      id: 2
      author: gemini
      changes:
        - createTable:
            tableName: stage_hosts
            columns:
              - column:
                  name: stage_id
                  type: varchar(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_hosts_stage
                    references: stages(stage_id)
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_hosts_user
                    references: users(user_id)
              - column:
                  name: stance
                  type: varchar(16)
        - addPrimaryKey:
            tableName: stage_hosts
            columnNames: stage_id, user_id
  - changeSet:
      id: 3
      author: gemini
      changes:
        - addColumn:
            tableName: stages
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: stages
            constraintName: fk_stages_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims