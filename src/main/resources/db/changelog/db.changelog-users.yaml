databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: external_user_id
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: birthdate
                  type: date
              - column:
                  name: avatar_url
                  type: varchar(1024)

  - changeSet:
      id: 2
      author: claude
      changes:
        - createTable:
            tableName: user_follows
            columns:
              - column:
                  name: follower_user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: following_user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_follows
            columnNames: follower_user_id, following_user_id
        - addForeignKeyConstraint:
            baseTableName: user_follows
            baseColumnNames: follower_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_follows_follower
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_follows
            baseColumnNames: following_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_follows_following
            onDelete: CASCADE
        - createIndex:
            tableName: user_follows
            indexName: idx_user_follows_follower
            columns:
              - column:
                  name: follower_user_id
        - createIndex:
            tableName: user_follows
            indexName: idx_user_follows_following
            columns:
              - column:
                  name: following_user_id

  - changeSet:
      id: 3
      author: claude
      changes:
        - renameTable:
            oldTableName: user_follows
            newTableName: followers

  - changeSet:
      id: 4
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: rank
                  type: int
                  defaultValue: 0
                  constraints:
                    nullable: false
        - createIndex:
            tableName: users
            indexName: idx_users_rank
            columns:
              - column:
                  name: rank
                  descending: true

  - changeSet:
      id: 5
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: deleted
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false