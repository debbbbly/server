databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: external_user_id
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    unique: true
              - column:
                  name: birthdate
                  type: date
              - column:
                  name: avatar_url
                  type: varchar(1024)

  - changeSet:
      id: 2
      author: claude
      changes:
        - createTable:
            tableName: user_follows
            columns:
              - column:
                  name: follower_user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: following_user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_follows
            columnNames: follower_user_id, following_user_id
        - addForeignKeyConstraint:
            baseTableName: user_follows
            baseColumnNames: follower_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_follows_follower
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_follows
            baseColumnNames: following_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_follows_following
            onDelete: CASCADE
        - createIndex:
            tableName: user_follows
            indexName: idx_user_follows_follower
            columns:
              - column:
                  name: follower_user_id
        - createIndex:
            tableName: user_follows
            indexName: idx_user_follows_following
            columns:
              - column:
                  name: following_user_id

  - changeSet:
      id: 3
      author: claude
      changes:
        - renameTable:
            oldTableName: user_follows
            newTableName: followers

  - changeSet:
      id: 4
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: rank
                  type: int
                  defaultValue: 0
                  constraints:
                    nullable: false
        - createIndex:
            tableName: users
            indexName: idx_users_rank
            columns:
              - column:
                  name: rank
                  descending: true

  - changeSet:
      id: 5
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: deleted
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 6
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: bio
                  type: varchar(1024)

  - changeSet:
      id: 7
      author: claude
      changes:
        - createTable:
            tableName: user_social_usernames
            columns:
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: social_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_social_usernames
            columnNames: user_id, social_type
            constraintName: pk_user_social_usernames
        - addForeignKeyConstraint:
            baseTableName: user_social_usernames
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_social_usernames_user
            onDelete: CASCADE

  - changeSet:
      id: 8
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: username_normalized
                  type: varchar(255)
        - sql:
            sql: UPDATE users SET username_normalized = LOWER(username)
        - addNotNullConstraint:
            tableName: users
            columnName: username_normalized
        - dropUniqueConstraint:
            tableName: users
            constraintName: users_username_key
        - addUniqueConstraint:
            tableName: users
            columnNames: username_normalized
            constraintName: users_username_normalized_key

  - changeSet:
      id: 9
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_login
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: last_seen
                  type: timestamp
                  constraints:
                    nullable: true
        - createIndex:
            tableName: users
            indexName: idx_users_last_login
            columns:
              - column:
                  name: last_login
                  descending: true
        - createIndex:
            tableName: users
            indexName: idx_users_last_seen
            columns:
              - column:
                  name: last_seen
                  descending: true

  - changeSet:
      id: 10
      author: claude
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: banned
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false

  - changeSet:
      id: 11
      author: claude
      changes:
        - createTable:
            tableName: user_reports
            columns:
              - column:
                  name: report_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: reporter_user_id
                  type: varchar(16)
                  constraints:
                    nullable: true
              - column:
                  name: reported_user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_reports
            baseColumnNames: reporter_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_reports_reporter
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: user_reports
            baseColumnNames: reported_user_id
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_user_reports_reported
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: user_reports
            columnNames: reporter_user_id, reported_user_id
            constraintName: uq_user_reports_reporter_reported
        - createIndex:
            tableName: user_reports
            indexName: idx_user_reports_reported
            columns:
              - column:
                  name: reported_user_id

