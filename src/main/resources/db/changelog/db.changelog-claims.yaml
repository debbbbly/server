databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: varchar(1024)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: tag_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(64)
                  constraints:
                    nullable: false
        - createTable:
            tableName: claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(512)
                  constraints:
                    nullable: false
        - createTable:
            tableName: claims_tags
            columns:
              - column:
                  name: claims_claim_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: tags_tag_id
                  type: varchar(16)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: claims
            constraintName: fk_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
        - addForeignKeyConstraint:
            baseColumnNames: claims_claim_id
            baseTableName: claims_tags
            constraintName: fk_claims_tags_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
        - addForeignKeyConstraint:
            baseColumnNames: tags_tag_id
            baseTableName: claims_tags
            constraintName: fk_claims_tags_tag_id
            referencedColumnNames: tag_id
            referencedTableName: tags
  - changeSet:
      id: 2
      author: gemini
      changes:
        - addColumn:
            tableName: categories
            columns:
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
  - changeSet:
      id: 3
      author: gemini
      changes:
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "politics"
              - column:
                  name: title
                  value: "Politics & Power"
              - column:
                  name: avatar_url
                  value: "./categories/politics.png"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "society"
              - column:
                  name: title
                  value: "Society, Identity & Culture"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "economy"
              - column:
                  name: title
                  value: "Economy & Environment"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "entertainment"
              - column:
                  name: title
                  value: "Sports, Entertainment & Lifestyle"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "technology"
              - column:
                  name: title
                  value: "Technology & Science"

              - column:
                  name: active
                  valueBoolean: true
  - changeSet:
      id: 5
      author: gemini
      changes:
        - createTable:
            tableName: users_claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stance
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: int
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: users_claims
            constraintName: fk_users_claims_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: users_claims
            constraintName: fk_users_claims_user_id
            referencedColumnNames: user_id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: users_claims
            constraintName: fk_users_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
  - changeSet:
      id: 6
      author: gemini
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: popularity
                  type: int
                  constraints:
                    nullable: true
  - changeSet:
      id: 7
      author: gemini
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
  - changeSet:
      id: 8
      author: gemini
      changes:
        - createTable:
            tableName: claim_proposals
            columns:
              - column:
                  name: proposal_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: original_title
                  type: varchar(512)
                  constraints:
                    nullable: false
              - column:
                  name: normalized_title
                  type: varchar(512)
                  constraints:
                    nullable: true
              - column:
                  name: is_valid
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: failure_reasons
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: ai_reasoning
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: suggested_category_id
                  type: varchar(64)
                  constraints:
                    nullable: true
              - column:
                  name: suggested_tags
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: requested_stance
                  type: varchar(16)
                  constraints:
                    nullable: true
              - column:
                  name: resulting_claim_id
                  type: varchar(16)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: claim_proposals
            constraintName: fk_claim_proposals_user_id
            referencedColumnNames: user_id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseColumnNames: resulting_claim_id
            baseTableName: claim_proposals
            constraintName: fk_claim_proposals_resulting_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
  - changeSet:
      id: 9
      author: claude
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: score_freshness
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_stances_recent
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_debates_recent
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_baseline
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_total
                  type: double
                  constraints:
                    nullable: true
  - changeSet:
      id: 10
      author: claude
      changes:
        - addColumn:
            tableName: claim_proposals
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    nullable: true
        - renameColumn:
            tableName: claim_proposals
            oldColumnName: ai_reasoning
            newColumnName: reasoning
            columnDataType: text
        - renameColumn:
            tableName: claim_proposals
            oldColumnName: suggested_category_id
            newColumnName: category_id
            columnDataType: varchar(64)
        - renameColumn:
            tableName: claim_proposals
            oldColumnName: requested_stance
            newColumnName: user_stance
            columnDataType: varchar(16)
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: claim_proposals
            constraintName: fk_claim_proposals_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
  - changeSet:
      id: 11
      author: claude
      changes:
        - renameColumn:
            tableName: claim_proposals
            oldColumnName: suggested_tags
            newColumnName: tags
            columnDataType: text
        - dropColumn:
            tableName: claim_proposals
            columnName: resulting_claim_id
