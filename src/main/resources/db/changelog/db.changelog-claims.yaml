databaseChangeLog:
  - changeSet:
      id: create-claims-table
      author: gemini
      changes:
        - createTable:
            tableName: claims
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: topic
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
