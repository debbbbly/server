databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: varchar(1024)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: tag_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(64)
                  constraints:
                    nullable: false
        - createTable:
            tableName: claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(512)
                  constraints:
                    nullable: false
        - createTable:
            tableName: claims_tags
            columns:
              - column:
                  name: claims_claim_id
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: tags_tag_id
                  type: varchar(16)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: claims
            constraintName: fk_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
        - addForeignKeyConstraint:
            baseColumnNames: claims_claim_id
            baseTableName: claims_tags
            constraintName: fk_claims_tags_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
        - addForeignKeyConstraint:
            baseColumnNames: tags_tag_id
            baseTableName: claims_tags
            constraintName: fk_claims_tags_tag_id
            referencedColumnNames: tag_id
            referencedTableName: tags
  - changeSet:
      id: 2
      author: gemini
      changes:
        - addColumn:
            tableName: categories
