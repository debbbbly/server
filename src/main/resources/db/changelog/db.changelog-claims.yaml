databaseChangeLog:
  - changeSet:
      id: 1
      author: gemini
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: varchar(1024)
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createTable:
            tableName: claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(512)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: claims
            constraintName: fk_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
  - changeSet:
      id: 2
      author: gemini
      changes:
        - addColumn:
            tableName: categories
            columns:
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
  - changeSet:
      id: 3
      author: gemini
      changes:
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "politics"
              - column:
                  name: title
                  value: "Politics & Power"
              - column:
                  name: avatar_url
                  value: "./categories/politics.png"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "society"
              - column:
                  name: title
                  value: "Society, Identity & Culture"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "economy"
              - column:
                  name: title
                  value: "Economy & Environment"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "entertainment"
              - column:
                  name: title
                  value: "Sports, Entertainment & Lifestyle"
              - column:
                  name: active
                  valueBoolean: true
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "technology"
              - column:
                  name: title
                  value: "Technology & Science"

              - column:
                  name: active
                  valueBoolean: true
  - changeSet:
      id: 5
      author: gemini
      changes:
        - createTable:
            tableName: users_claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stance
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: int
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: users_claims
            constraintName: fk_users_claims_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: users_claims
            constraintName: fk_users_claims_user_id
            referencedColumnNames: user_id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: users_claims
            constraintName: fk_users_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
  - changeSet:
      id: 6
      author: gemini
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: popularity
                  type: int
                  constraints:
                    nullable: true
  - changeSet:
      id: 7
      author: gemini
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
  - changeSet:
      id: 9
      author: claude
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: score_freshness
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_stances_recent
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_debates_recent
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_baseline
                  type: double
                  constraints:
                    nullable: true
              - column:
                  name: score_total
                  type: double
                  constraints:
                    nullable: true
  - changeSet:
      id: 12
      author: claude
      changes:
        - createIndex:
            indexName: idx_claims_created_at
            tableName: claims
            columns:
              - column:
                  name: created_at
  - changeSet:
      id: 13
      author: claude
      comment: remove claim score columns
      changes:
        - dropColumn:
            tableName: claims
            columnName: score_freshness
        - dropColumn:
            tableName: claims
            columnName: score_stances_recent
        - dropColumn:
            tableName: claims
            columnName: score_debates_recent
        - dropColumn:
            tableName: claims
            columnName: score_baseline
        - dropColumn:
            tableName: claims
            columnName: score_total

  - changeSet:
      id: 14
      author: claude
      comment: Add slug column for URL-friendly claim identifiers
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: slug
                  type: varchar(100)
                  constraints:
                    nullable: true
        - createIndex:
            indexName: idx_claims_slug
            tableName: claims
            columns:
              - column:
                  name: slug
            unique: true

  - changeSet:
      id: 15
      author: claude
      comment: "Add Moderation category for internal/system claims"
      changes:
        - insert:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  value: "moderation"
              - column:
                  name: title
                  value: "Moderation"
              - column:
                  name: active
                  valueBoolean: false

  - changeSet:
      id: 16
      author: claude
      comment: Add removed column for soft-delete
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: removed
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
