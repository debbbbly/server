  - changeSet:
      id: 5
      author: gemini
      changes:
        - createTable:
            tableName: users_claims
            columns:
              - column:
                  name: claim_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stance
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: int
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: claim_id
            baseTableName: users_claims
            constraintName: fk_users_claims_claim_id
            referencedColumnNames: claim_id
            referencedTableName: claims
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: users_claims
            constraintName: fk_users_claims_user_id
            referencedColumnNames: user_id
            referencedTableName: users
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: users_claims
            constraintName: fk_users_claims_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
