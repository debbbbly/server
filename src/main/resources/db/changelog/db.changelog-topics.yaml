databaseChangeLog:
  - changeSet:
      id: 1
      author: claude
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: topic_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(512)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: category_id
            baseTableName: topics
            constraintName: fk_topics_category_id
            referencedColumnNames: category_id
            referencedTableName: categories
        - createIndex:
            indexName: idx_topics_category_id
            tableName: topics
            columns:
              - column:
                  name: category_id
      comment: "Create topics table for storing debate topics with category"

  - changeSet:
      id: 2
      author: claude
      changes:
        - createTable:
            tableName: topic_similarities
            columns:
              - column:
                  name: topic_id_1
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: topic_id_2
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: similarity
                  type: double
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: topic_id_1
            baseTableName: topic_similarities
            constraintName: fk_topic_similarities_topic_id_1
            referencedColumnNames: topic_id
            referencedTableName: topics
        - addForeignKeyConstraint:
            baseColumnNames: topic_id_2
            baseTableName: topic_similarities
            constraintName: fk_topic_similarities_topic_id_2
            referencedColumnNames: topic_id
            referencedTableName: topics
      comment: "Create topic_similarities table for storing topic similarity relationships"

  - changeSet:
      id: 3
      author: claude
      changes:
        - createIndex:
            indexName: idx_topic_similarities_topic_id_1
            tableName: topic_similarities
            columns:
              - column:
                  name: topic_id_1
        - createIndex:
            indexName: idx_topic_similarities_similarity
            tableName: topic_similarities
            columns:
              - column:
                  name: similarity
                  descending: true
      comment: "Create indexes for efficient similarity queries"

  - changeSet:
      id: 4
      author: claude
      changes:
        - addColumn:
            tableName: claims
            columns:
              - column:
                  name: topic_id
                  type: varchar(16)
                  constraints:
                    nullable: true
              - column:
                  name: topic_stance
                  type: varchar(16)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseColumnNames: topic_id
            baseTableName: claims
            constraintName: fk_claims_topic_id
            referencedColumnNames: topic_id
            referencedTableName: topics
      comment: "Add topic_id and topic_stance to claims table"

  - changeSet:
      id: 5
      author: claude
      changes:
        - createIndex:
            indexName: idx_claims_topic_id
            tableName: claims
            columns:
              - column:
                  name: topic_id
      comment: "Create index on claims.topic_id for efficient topic-based queries"

  - changeSet:
      id: 6
      author: claude
      changes:
        - createIndex:
            indexName: idx_claims_category_id
            tableName: claims
            columns:
              - column:
                  name: category_id
      comment: "Create index on claims.category_id for efficient category filtering (previously missing)"

  - changeSet:
      id: 8
      author: claude
      changes:
        - renameColumn:
            tableName: claims
            oldColumnName: topic_stance
            newColumnName: stance_to_topic
            columnDataType: varchar(16)
      comment: "Rename topic_stance to topic_alignment for clarity (indicates how claim aligns with topic)"

  - changeSet:
      id: 9
      author: claude
      comment: "Backfill claim topics and stance defaults"
      changes:
        - sql:
            sql: |
              INSERT INTO topics (topic_id, category_id, title, created_at, updated_at)
              SELECT 'other', 'society', 'Other', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              WHERE NOT EXISTS (SELECT 1 FROM topics WHERE topic_id = 'other');
        - sql:
            sql: UPDATE claims SET topic_id = 'other' WHERE topic_id IS NULL;
        - sql:
            sql: UPDATE claims SET stance_to_topic = 'NEUTRAL' WHERE stance_to_topic IS NULL;
        - addNotNullConstraint:
            tableName: claims
            columnName: topic_id
            columnDataType: varchar(16)
        - addNotNullConstraint:
            tableName: claims
            columnName: stance_to_topic
            columnDataType: varchar(16)

  - changeSet:
      id: 10
      author: claude
      comment: "Create users_topics table for storing user stances on topics"
      changes:
        - createTable:
            tableName: users_topics
            columns:
              - column:
                  name: topic_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stance
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseColumnNames: topic_id
            baseTableName: users_topics
            constraintName: fk_users_topics_topic_id
            referencedColumnNames: topic_id
            referencedTableName: topics
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: users_topics
            constraintName: fk_users_topics_user_id
            referencedColumnNames: user_id
            referencedTableName: users
        - createIndex:
            indexName: idx_users_topics_user_id
            tableName: users_topics
            columns:
              - column:
                  name: user_id
