spring:
  application:
    name: server
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_j6qBaKisl
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.0

server:
  port: 8080

livekit:
  wss: wss://debbly.duckdns.org
  http: https://debbly.duckdns.org
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}

cognito:
  region: us-west-2
  client-id: 3kjpccjofeesv4bv8hjsqliple
  user-pool-id: us-west-2_Fm2VsaCqc
  domain: debbly-auth

stage:
  limit-minutes: 15
