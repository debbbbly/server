spring:
  application:
    name: server
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA}

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA}
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_API_MODEL}
          temperature: 1

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true

livekit:
  url: ${LIVEKIT_API_URL}
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}

auth:
  url: ${AUTH_URL:${AUTH_PUBLIC_URL}}
  public-url: ${AUTH_PUBLIC_URL}
  jwt-secret: ${AUTH_JWT_SECRET}

s3:
  default:
    endpoint: ${S3_DEFAULT_ENDPOINT}
#    public-endpoint: ${S3_DEFAULT_PUBLIC_ENDPOINT}
    region: ${S3_DEFAULT_REGION}
    access-key: ${S3_DEFAULT_ACCESS_KEY}
    secret: ${S3_DEFAULT_SECRET}
    bucket:
      users: ${S3_DEFAULT_BUCKET_USERS}
  lk:
    endpoint: ${S3_LK_ENDPOINT}
#    public-endpoint: ${S3_LK_PUBLIC_ENDPOINT}
    region: ${S3_LK_REGION}
    access-key: ${S3_LK_ACCESS_KEY}
    secret: ${S3_LK_SECRET}
    bucket:
      egress: ${S3_LK_BUCKET_EGRESS}

stage:
  limit-minutes: 10

pusher:
  app-id: ${PUSHER_APP_ID}
  key: ${PUSHER_KEY}
  secret: ${PUSHER_SECRET}
  cluster: ${PUSHER_CLUSTER}

logging:
  level:
    root: INFO
